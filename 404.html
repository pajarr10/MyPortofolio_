<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>.env</title>
    <style>
        /* ===== RESET & GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: not-allowed !important;
            user-select: none;
        }

        body {
            background: #00ff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            animation: flickerBg 0.1s infinite alternate;
        }

        @keyframes flickerBg {
            0% { background-color: #00ff00; }
            50% { background-color: #00cc00; }
            100% { background-color: #00ff66; }
        }

        /* ===== SCANLINE & NOISE ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 9999;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMjUiIC8+PC9zdmc+');
            opacity: 0.4;
            pointer-events: none;
            z-index: 9998;
            background-size: 200px 200px;
        }

        /* ===== SPAM IMAGE CONTAINER ===== */
        #spamContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }

        .spam-image {
            position: absolute;
            width: 200px;
            height: auto;
            animation: floatImage 2s infinite alternate ease-in-out;
            pointer-events: none;
            opacity: 0.95;
            object-fit: contain;
        }

        @keyframes floatImage {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(40px, -40px) rotate(8deg) scale(1.15); }
        }

        /* ===== SISTEM INFO ===== */
        .sys-info {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: #00ff00;
            background: rgba(0,0,0,0.85);
            padding: 15px 25px;
            font-size: 14px;
            border: 2px solid #00ff00;
            z-index: 200;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            text-shadow: 0 0 8px #00ff00;
            max-width: 350px;
            pointer-events: none;
        }

        .sys-info span { color: #ff00ff; }

        /* ===== COUNTDOWN ===== */
        .countdown {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200;
            background: rgba(0,0,0,0.9);
            color: #ff0000;
            font-size: 3rem;
            font-weight: bold;
            padding: 15px 35px;
            border: 3px solid #ff0000;
            box-shadow: 0 0 40px #ff0000;
            text-shadow: 0 0 25px #ff0000;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }

        /* ===== SCAN BAR ===== */
        .scan-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            text-align: center;
            pointer-events: none;
        }

        .scan-label {
            color: #00ff00;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 4px 16px;
            border: 1px solid #00ff00;
            text-shadow: 0 0 8px #00ff00;
            display: inline-block;
            margin-bottom: 6px;
        }

        .scan-bar {
            width: 400px;
            max-width: 80vw;
            height: 22px;
            background: #111;
            border: 3px solid #00ff00;
            overflow: hidden;
            box-shadow: 0 0 25px #00ff00;
            margin: 0 auto;
        }

        .scan-bar .fill {
            width: 0%;
            height: 100%;
            background: #00ff00;
            animation: scanLoop 2s infinite linear;
        }

        @keyframes scanLoop {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ===== OVERLAY GELAP ===== */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.25);
            pointer-events: none;
            z-index: 10;
        }

        /* ===== START OVERLAY ===== */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        #startOverlay h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            color: #ff0000;
            text-shadow: 0 0 40px #ff0000;
            margin-bottom: 20px;
        }

        #startOverlay p {
            color: #aaa;
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
        }

        #startOverlay .start-btn {
            background: #ff0000;
            border: none;
            padding: 18px 60px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 50px #ff0000;
            transition: 0.2s;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        #startOverlay .start-btn:hover {
            transform: scale(1.06);
            background: #cc0000;
        }

        /* ===== RESPONSIF ===== */
        @media (max-width: 600px) {
            .sys-info { font-size: 11px; padding: 10px 15px; left: 10px; bottom: 10px; max-width: 200px; }
            .countdown { font-size: 2rem; padding: 10px 20px; bottom: 10px; right: 10px; }
            .scan-bar { width: 90vw; }
            .spam-image { width: 120px; }
        }
    </style>
</head>
<body>

    <!-- ===== START OVERLAY ===== -->
    <div id="startOverlay">
        <h1>⚠️ KHUSUS ADMIN ⚠️</h1>
        <p>Klik tombol di bawah untuk melihat file tersembunyi pixajar.<br>
        <span style="color:#666; font-size:0.9rem;">* khusus owner</span></p>
        <button class="start-btn" id="startBtn">▶ klik untuk lihat file tersembunyi</button>
    </div>

    <!-- ===== KONTEN UTAMA ===== -->
    <div id="mainContent" style="display:none;">

        <!-- SPAM IMAGE CONTAINER -->
        <div id="spamContainer"></div>

        <!-- Info sistem -->
        <div class="sys-info" id="sysInfo">
            <span>IP:</span> <span id="ip">192.168.1.1</span><br>
            <span>Browser:</span> <span id="browser">Chrome</span><br>
            <span>OS:</span> <span id="os">Windows XP</span><br>
            <span>Screen:</span> <span id="screen">1920x1080</span><br>
            <span>Language:</span> <span id="lang">id-ID</span><br>
            <span>Uptime:</span> <span id="uptime">0s</span>
        </div>

        <!-- Countdown -->
        <div class="countdown" id="countdown">15</div>

        <!-- Scan bar -->
        <div class="scan-container">
            <div class="scan-label">🔍 Mengenkripsi semua data anda.</div>
            <div class="scan-bar"><div class="fill"></div></div>
        </div>

        <!-- Overlay gelap -->
        <div class="dark-overlay"></div>
    </div>

    <script>
        (function() {
            // ===== AUDIO =====
            const audio = new Audio('https://c.termai.cc/a164/mWaz.mp3');
            audio.loop = false;
            audio.volume = 1.0;

            // ===== DOM REFS =====
            const startOverlay = document.getElementById('startOverlay');
            const startBtn = document.getElementById('startBtn');
            const mainContent = document.getElementById('mainContent');
            const countdownEl = document.getElementById('countdown');
            const spamContainer = document.getElementById('spamContainer');
            const sysInfo = {
                ip: document.getElementById('ip'),
                browser: document.getElementById('browser'),
                os: document.getElementById('os'),
                screen: document.getElementById('screen'),
                lang: document.getElementById('lang'),
                uptime: document.getElementById('uptime')
            };

            let started = false;
            let spamInterval = null;

            // ===== FAKE IP =====
            function randomIP() {
                return `192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            }

            // ===== SPAM IMAGES DARI URL (BERULANG TANPA JEDA) =====
            function spamImages() {
                const imageUrls = [
                    'https://c.termai.cc/i176/Dn3qCP.jpg',
                    'https://c.termai.cc/i109/F1rJj.jpg'
                ];
                const container = document.getElementById('spamContainer');
                if (!container) return;

                // Hapus semua gambar lama
                container.innerHTML = '';

                // Spam 60-80 gambar (lebih banyak agar lebih chaos)
                const count = 60 + Math.floor(Math.random() * 40);
                for (let i = 0; i < count; i++) {
                    const img = document.createElement('img');
                    // Pilih salah satu URL secara acak
                    const url = imageUrls[Math.floor(Math.random() * imageUrls.length)];
                    img.src = url;
                    img.className = 'spam-image';
                    img.style.left = Math.random() * 90 + '%';
                    img.style.top = Math.random() * 90 + '%';
                    img.style.width = (120 + Math.random() * 150) + 'px';
                    img.style.animationDelay = (Math.random() * 1) + 's';
                    img.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                    img.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
                    img.setAttribute('alt', 'spam');
                    container.appendChild(img);
                }
            }

            // ===== START =====
            startBtn.addEventListener('click', function() {
                if (started) return;
                started = true;

                // Play audio
                audio.play().catch(e => console.warn('Audio play error:', e));

                // Tampilkan konten
                startOverlay.style.display = 'none';
                mainContent.style.display = 'block';

                // ===== FULLSCREEN =====
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(e => console.warn('Fullscreen error:', e));
                }

                // ===== INFO SISTEM =====
                sysInfo.ip.textContent = randomIP();
                sysInfo.browser.textContent = navigator.userAgent.split(' ').slice(-1)[0] || 'Unknown';
                sysInfo.os.textContent = navigator.platform || 'Unknown OS';
                sysInfo.screen.textContent = `${window.screen.width}x${window.screen.height}`;
                sysInfo.lang.textContent = navigator.language || 'id-ID';

                let seconds = 0;
                setInterval(() => {
                    seconds++;
                    sysInfo.uptime.textContent = seconds + 's';
                }, 1000);

                // ===== SPAM IMAGES BERULANG TANPA JEDA (setiap 0.5 detik) =====
                spamImages(); // langsung jalankan pertama kali
                spamInterval = setInterval(spamImages, 500); // ulangi setiap 500ms

                // ===== COUNTDOWN 10 DETIK → REDIRECT =====
                let count = 15;
                countdownEl.textContent = count;
                const interval = setInterval(() => {
                    count--;
                    countdownEl.textContent = count;
                    if (count <= 0) {
                        clearInterval(interval);
                        clearInterval(spamInterval); // hentikan spam
                        window.location.href = '/';
                    }
                }, 1000);
            });

            // ===== LOCK MOUSE =====
            document.addEventListener('click', function() {
                if (document.pointerLockElement !== document.body) {
                    document.body.requestPointerLock().catch(e => console.warn('Pointer lock error:', e));
                }
            });
        })();
    </script>

</body>
</html>
