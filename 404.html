<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>data pixajar</title>
    <style>
        /* ===== RESET & GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important; /* Hilangkan cursor */
            user-select: none;
        }

        body {
            background: #00ff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            animation: flickerBg 0.1s infinite alternate;
        }

        @keyframes flickerBg {
            0% { background-color: #00ff00; }
            50% { background-color: #00cc00; }
            100% { background-color: #00ff66; }
        }

        /* ===== SCANLINE + NOISE ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 9999;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMjUiIC8+PC9zdmc+');
            opacity: 0.4;
            pointer-events: none;
            z-index: 9998;
            background-size: 200px 200px;
        }

        /* ===== GLITCH UTAMA ===== */
        .main-glitch {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
            color: #ff0000;
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 2px 2px 0 #000;
            animation: glitchText 0.7s infinite step-end;
            letter-spacing: 4px;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border: 4px solid #ff0000;
            box-shadow: 0 0 50px #ff0000;
            pointer-events: none;
        }

        @keyframes glitchText {
            0% { transform: translate(-50%, -50%) skew(0deg) scale(1); }
            20% { transform: translate(-50%, -50%) skew(4deg) scale(1.03); }
            40% { transform: translate(-50%, -50%) skew(-4deg) scale(0.97); }
            60% { transform: translate(-50%, -50%) skew(2deg) scale(1.01); }
            80% { transform: translate(-50%, -50%) skew(-2deg) scale(0.99); }
            100% { transform: translate(-50%, -50%) skew(0deg) scale(1); }
        }

        /* ===== SISTEM INFO ===== */
        .sys-info {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: #00ff00;
            background: rgba(0,0,0,0.85);
            padding: 15px 25px;
            font-size: 14px;
            border: 2px solid #00ff00;
            z-index: 200;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            text-shadow: 0 0 8px #00ff00;
            max-width: 350px;
            pointer-events: none;
        }

        .sys-info span { color: #ff00ff; }

        /* ===== COUNTDOWN ===== */
        .countdown {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200;
            background: rgba(0,0,0,0.9);
            color: #ff0000;
            font-size: 3rem;
            font-weight: bold;
            padding: 15px 35px;
            border: 3px solid #ff0000;
            box-shadow: 0 0 40px #ff0000;
            text-shadow: 0 0 25px #ff0000;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }

        /* ===== SCAN BAR ===== */
        .scan-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            text-align: center;
            pointer-events: none;
        }

        .scan-label {
            color: #00ff00;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 4px 16px;
            border: 1px solid #00ff00;
            text-shadow: 0 0 8px #00ff00;
            display: inline-block;
            margin-bottom: 6px;
        }

        .scan-bar {
            width: 400px;
            max-width: 80vw;
            height: 22px;
            background: #111;
            border: 3px solid #00ff00;
            overflow: hidden;
            box-shadow: 0 0 25px #00ff00;
            margin: 0 auto;
        }

        .scan-bar .fill {
            width: 0%;
            height: 100%;
            background: #00ff00;
            animation: scanLoop 2s infinite linear;
        }

        @keyframes scanLoop {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ===== WINDOWS XP POPUP ===== */
        .win-popup {
            position: fixed;
            min-width: 200px;
            max-width: 320px;
            background: #e0e0e0;
            border: 2px solid #0055aa;
            border-radius: 4px;
            box-shadow: 4px 4px 14px rgba(0,0,0,0.8);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            z-index: 500;
            animation: shakeFade 0.35s ease-out;
            opacity: 0.95;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .win-popup .title-bar {
            background: linear-gradient(180deg, #0055aa 0%, #003388 100%);
            color: white;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-radius: 4px 4px 0 0;
        }

        .win-popup .title-bar .close {
            background: #c0c0c0;
            border: 1px solid #777;
            color: black;
            font-weight: bold;
            width: 18px;
            height: 18px;
            text-align: center;
            line-height: 16px;
            font-size: 12px;
            border-radius: 2px;
        }

        .win-popup .content {
            padding: 12px 16px 16px 16px;
            font-size: 13px;
            color: #000;
            background: #f0f0f0;
            border-radius: 0 0 4px 4px;
            border: 1px solid #aaa;
            border-top: none;
        }

        .win-popup .content .btn-ok {
            margin-top: 12px;
            background: #d4d4d4;
            border: 2px solid #888;
            border-top-color: #fff;
            border-left-color: #fff;
            padding: 4px 24px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 2px;
            float: right;
            cursor: default;
        }

        @keyframes shakeFade {
            0% { transform: translate(0,0) scale(0.7); opacity: 0; }
            30% { transform: translate(-12px,8px) scale(1.03); }
            60% { transform: translate(10px,-6px) scale(0.97); }
            100% { transform: translate(0,0) scale(1); opacity: 1; }
        }

        /* ===== OVERLAY GELAP ===== */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 10;
        }

        /* ===== START OVERLAY ===== */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        #startOverlay h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            color: #ff0000;
            text-shadow: 0 0 40px #ff0000;
            margin-bottom: 20px;
        }

        #startOverlay p {
            color: #aaa;
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
        }

        #startOverlay .start-btn {
            background: #ff0000;
            border: none;
            padding: 18px 60px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 50px #ff0000;
            transition: 0.2s;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        #startOverlay .start-btn:hover {
            transform: scale(1.06);
            background: #cc0000;
        }

        /* ===== RESPONSIF ===== */
        @media (max-width: 600px) {
            .sys-info { font-size: 11px; padding: 10px 15px; left: 10px; bottom: 10px; max-width: 200px; }
            .countdown { font-size: 2rem; padding: 10px 20px; bottom: 10px; right: 10px; }
            .scan-bar { width: 90vw; }
            .main-glitch { font-size: 2rem; padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <!-- ===== START OVERLAY ===== -->
    <div id="startOverlay">
        <h1>⚠️ 404 ⚠️</h1>
        <p>Klik tombol di bawah untuk memulai kembali ke home.<br>
        <span style="color:#666; font-size:0.9rem;">* otomatis kembali ke halaman</span></p>
        <button class="start-btn" id="startBtn">▶ KEMBALI</button>
    </div>

    <!-- ===== KONTEN UTAMA ===== -->
    <div id="mainContent" style="display:none;">

        <!-- Glitch utama -->
        <div class="main-glitch" id="mainGlitch">SYSTEM INFECTED - TOTAL FAILURE</div>

        <!-- Info sistem -->
        <div class="sys-info" id="sysInfo">
            <span>IP:</span> <span id="ip">192.168.1.1</span><br>
            <span>Browser:</span> <span id="browser">Chrome</span><br>
            <span>OS:</span> <span id="os">Windows XP</span><br>
            <span>Screen:</span> <span id="screen">1920x1080</span><br>
            <span>Language:</span> <span id="lang">id-ID</span><br>
            <span>Uptime:</span> <span id="uptime">0s</span>
        </div>

        <!-- Countdown -->
        <div class="countdown" id="countdown">10</div>

        <!-- Scan bar -->
        <div class="scan-container">
            <div class="scan-label">🔍 Scanning system files...</div>
            <div class="scan-bar"><div class="fill"></div></div>
        </div>

        <!-- Overlay gelap -->
        <div class="dark-overlay"></div>
    </div>

    <script>
        (function() {
            // ===== AUDIO =====
            const audio = new Audio('https://c.termai.cc/a164/mWaz.mp3');
            audio.loop = false;
            audio.volume = 0.5;

            // ===== DOM REFS =====
            const startOverlay = document.getElementById('startOverlay');
            const startBtn = document.getElementById('startBtn');
            const mainContent = document.getElementById('mainContent');
            const countdownEl = document.getElementById('countdown');
            const mainGlitch = document.getElementById('mainGlitch');
            const sysInfo = {
                ip: document.getElementById('ip'),
                browser: document.getElementById('browser'),
                os: document.getElementById('os'),
                screen: document.getElementById('screen'),
                lang: document.getElementById('lang'),
                uptime: document.getElementById('uptime')
            };

            let started = false;
            let popupCount = 0;
            const MAX_POPUPS = 45;

            // ===== PESAN POPUP =====
            const messages = [
                '⚠️ Virus Detected!',
                '❌ System Error 0x00000F4',
                '💾 Memory Corrupted',
                '🔧 Registry Broken',
                '🚫 Access Denied',
                '🔓 Security Breach',
                '💣 Ransomware payload',
                '📀 Hard disk failure',
                '🛑 Critical process died',
                '📡 Backdoor installed',
                '💀 System32 deleted',
                '🔥 Firewall disabled',
                '⚡ Kernel panic',
                '🕵️ Keylogger active'
            ];

            // ===== FAKE IP =====
            function randomIP() {
                return `192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            }

            // ===== BUAT POPUP =====
            function createPopup() {
                if (popupCount >= MAX_POPUPS) return;

                const msg = messages[Math.floor(Math.random() * messages.length)];
                const x = Math.random() * (window.innerWidth - 280);
                const y = Math.random() * (window.innerHeight - 150);

                const popup = document.createElement('div');
                popup.className = 'win-popup';
                popup.style.left = x + 'px';
                popup.style.top = y + 'px';
                popup.style.width = (220 + Math.random() * 100) + 'px';

                popup.innerHTML = `
                    <div class="title-bar">
                        <span>⚠️ SYSTEM WARNING</span>
                        <span class="close">✖</span>
                    </div>
                    <div class="content">
                        <div style="margin-bottom:8px;">${msg}</div>
                        <div class="btn-ok">OK</div>
                    </div>
                `;

                document.body.appendChild(popup);
                popupCount++;

                setTimeout(() => {
                    if (popup.parentNode) {
                        popup.style.opacity = '0';
                        setTimeout(() => {
                            if (popup.parentNode) {
                                popup.remove();
                                popupCount--;
                            }
                        }, 500);
                    }
                }, 5000 + Math.random() * 4000);
            }

            // ===== LOOP POPUP =====
            function popupLoop() {
                if (popupCount < MAX_POPUPS) {
                    createPopup();
                    if (Math.random() > 0.6 && popupCount < MAX_POPUPS - 2) {
                        setTimeout(createPopup, 100);
                        setTimeout(createPopup, 250);
                    }
                }
                const delay = 200 + Math.random() * 500;
                setTimeout(popupLoop, delay);
            }

            // ===== GLITCH ROTASI =====
            const glitchTexts = [
                'SYSTEM INFECTED - TOTAL FAILURE',
                'YOU ARE AN IDIOT',
                'SECURITY COMPROMISED',
                'DATA LOST PERMANENTLY',
                'MALWARE ACTIVE',
                'PC IS DYING'
            ];

            function rotateGlitch() {
                if (Math.random() > 0.55) {
                    const rand = glitchTexts[Math.floor(Math.random() * glitchTexts.length)];
                    mainGlitch.textContent = rand;
                }
                setTimeout(rotateGlitch, 1800);
            }

            // ===== FULLSCREEN + POINTER LOCK =====
            function forceFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(e => {});
                }
                // Minta pointer lock
                if (!document.pointerLockElement) {
                    document.documentElement.requestPointerLock().catch(e => {});
                }
            }

            // ===== EVENT: KETIKA KELUAR FULLSCREEN, LANGSUNG KEMBALI =====
            document.addEventListener('fullscreenchange', function() {
                if (!document.fullscreenElement) {
                    // Kembali fullscreen
                    forceFullscreen();
                }
            });

            // ===== EVENT: KETIKA POINTER LOCK LEPAS, LANGSUNG KEMBALI =====
            document.addEventListener('pointerlockchange', function() {
                if (!document.pointerLockElement) {
                    forceFullscreen();
                }
            });

            // ===== BLOKIR ESC (DENGAN KEMBALI FULLSCREEN) =====
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    forceFullscreen();
                }
                // Blokir F11, F12, Alt+F4, dll? Tidak bisa semua, tapi kita tangani F11
                if (e.key === 'F11') {
                    e.preventDefault();
                    forceFullscreen();
                }
            });

            // ===== BLOKIR CLOSE TAB DENGAN PERINGATAN =====
            window.onbeforeunload = function(e) {
                e.preventDefault();
                e.returnValue = '⚠️ Virus aktif! Menutup tab dapat merusak sistem!';
                return '⚠️ Virus aktif! Menutup tab dapat merusak sistem!';
            };

            // ===== MULAI =====
            startBtn.addEventListener('click', function() {
                if (started) return;
                started = true;

                // Play audio
                audio.play().catch(e => console.warn('Audio play error:', e));

                // Tampilkan konten
                startOverlay.style.display = 'none';
                mainContent.style.display = 'block';

                // ===== FULLSCREEN + POINTER LOCK =====
                forceFullscreen();

                // ===== INFO SISTEM =====
                sysInfo.ip.textContent = randomIP();
                sysInfo.browser.textContent = navigator.userAgent.split(' ').slice(-1)[0] || 'Unknown';
                sysInfo.os.textContent = navigator.platform || 'Unknown OS';
                sysInfo.screen.textContent = `${window.screen.width}x${window.screen.height}`;
                sysInfo.lang.textContent = navigator.language || 'id-ID';

                let seconds = 0;
                setInterval(() => {
                    seconds++;
                    sysInfo.uptime.textContent = seconds + 's';
                }, 1000);

                // ===== POPUP =====
                setTimeout(popupLoop, 800);

                // ===== GLITCH =====
                setTimeout(rotateGlitch, 1500);

                // ===== COUNTDOWN 10 DETIK → REDIRECT =====
                  let count = 100;
                countdownEl.textContent = count;
                const interval = setInterval(() => {
                    count--;
                    countdownEl.textContent = count;
                    if (count <= 0) {
                        clearInterval(interval);
                        window.location.href = '/';
                    }
                }, 1000);
            });

            // ===== TIDAK ADA ALERT/CONFIRM/PROMPT =====
            // ===== TIDAK ADA INFINITE LOOP BERBAHAYA =====
            // ===== TIDAK ADA BLOCK KEYBOARD/MOUSE SECARA PERMANEN =====
            // ===== BISA CLOSE TAB (dengan peringatan) =====
        })();
    </script>

</body>
</html>
