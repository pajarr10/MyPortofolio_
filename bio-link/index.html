<!DOCTYPE html>

<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F3EFE5;
      --black: #1A1A1A;
      --pink: #FF6B9D;
      --teal: #4ECDC4;
      --yellow: #FFE66D;
      --orange: #FF8C42;
      --purple: #9B5DE5;
      --cream: #FFF8E7;
      --white: #FFFFFF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Floating Background Shapes */
    .bg-shape {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: fadeInBg 1s ease forwards;
    }

    .bg-shape-1 {
      top: 5%;
      left: 5%;
      animation-delay: 0.3s;
    }

    .bg-shape-2 {
      top: 15%;
      right: 8%;
      animation-delay: 0.5s;
    }

    .bg-shape-3 {
      top: 45%;
      left: 3%;
      animation-delay: 0.7s;
    }

    .bg-shape-4 {
      bottom: 20%;
      right: 5%;
      animation-delay: 0.9s;
    }

    .bg-shape-5 {
      bottom: 8%;
      left: 10%;
      animation-delay: 1.1s;
    }

    .bg-shape-6 {
      top: 60%;
      right: 12%;
      animation-delay: 1.3s;
    }

    @keyframes fadeInBg {
      to { opacity: 1; }
    }

    .float-slow {
      animation: floatSlow 6s ease-in-out infinite;
    }

    .float-medium {
      animation: floatMedium 4s ease-in-out infinite;
    }

    .float-fast {
      animation: floatFast 3s ease-in-out infinite;
    }

    @keyframes floatSlow {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    @keyframes floatMedium {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(-5deg); }
    }

    @keyframes floatFast {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(8deg); }
    }

    /* Profile Photo */
    .profile-wrapper {
      position: relative;
      display: inline-block;
      animation: profileFloat 3s ease-in-out infinite;
    }

    @keyframes profileFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .profile-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--black);
      box-shadow: 6px 6px 0 var(--black);
      background: var(--white);
      position: relative;
      z-index: 2;
    }

    /* Online Indicator */
    .online-dot {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      background: #4ADE80;
      border: 3px solid var(--black);
      border-radius: 50%;
      z-index: 3;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Neo Brutalism Card */
    .neo-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border: 3px solid var(--black);
      border-radius: 20px;
      text-decoration: none;
      color: var(--black);
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      position: relative;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      overflow: hidden;
    }

    .neo-card .card-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--black);
      border-radius: 12px;
      flex-shrink: 0;
      background: var(--white);
    }

    .neo-card .card-icon svg {
      width: 22px;
      height: 22px;
    }

    /* Card Colors */
    .card-pink { background: var(--pink); box-shadow: 6px 6px 0 var(--black); }
    .card-teal { background: var(--teal); box-shadow: 6px 6px 0 var(--black); }
    .card-yellow { background: var(--yellow); box-shadow: 6px 6px 0 var(--black); }
    .card-orange { background: var(--orange); box-shadow: 6px 6px 0 var(--black); }
    .card-purple { background: var(--purple); box-shadow: 6px 6px 0 var(--black); }

    /* Hover */
    .neo-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0 var(--black);
    }

    .neo-card:active {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 var(--black);
    }

    /* Ripple Effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0);
      animation: rippleAnim 0.5s ease-out;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* Reveal Animation */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      animation: revealUp 0.6s ease forwards;
    }

    @keyframes revealUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }
    .delay-7 { animation-delay: 0.7s; }
    .delay-8 { animation-delay: 0.8s; }

    /* Name highlight underline */
    .name-highlight {
      position: relative;
      display: inline-block;
    }

    .name-highlight::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 0;
      width: 100%;
      height: 10px;
      background: var(--yellow);
      z-index: -1;
      border-radius: 2px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--white);
      border: 2.5px solid var(--black);
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--black);
    }

    .status-badge .dot {
      width: 8px;
      height: 8px;
      background: var(--pink);
      border-radius: 50%;
      border: 1.5px solid var(--black);
    }

    /* Bio text */
    .bio-text {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
      max-width: 320px;
    }

    /* Small doodle decorations around profile */
    .doodle-around {
      position: absolute;
      pointer-events: none;
    }

    /* Container */
    .main-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Sparkle animation */
    .sparkle {
      animation: sparkle 2s ease-in-out infinite;
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
      50% { transform: scale(1.2) rotate(15deg); opacity: 0.7; }
    }

    /* Star twinkle */
    .twinkle {
      animation: twinkle 1.5s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Wiggle on hover for doodles */
    .wiggle-hover:hover {
      animation: wiggle 0.5s ease;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
    }

    /* Footer text */
    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #999;
      margin-top: 30px;
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .profile-img {
        width: 110px;
        height: 110px;
      }
      .neo-card {
        padding: 16px 20px;
        font-size: 1rem;
      }
      .neo-card .card-icon {
        width: 40px;
        height: 40px;
      }
    }
  </style>

  <script>
    // Ripple Effect
    function createRipple(event, element) {
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      
      const rect = element.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = event.clientX - rect.left - size / 2;
      const y = event.clientY - rect.top - size / 2;
      
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      
      element.appendChild(ripple);
      
      setTimeout(() => {
        ripple.remove();
      }, 500);
    }

    // Add subtle parallax to background shapes on mouse move
    document.addEventListener('mousemove', (e) => {
      const shapes = document.querySelectorAll('.bg-shape');
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;
      
      shapes.forEach((shape, i) => {
        const factor = (i + 1) * 8;
        shape.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
      });
    });

    // Prevent default on cards for better touch experience
    document.querySelectorAll('.neo-card').forEach(card => {
      card.addEventListener('touchstart', function() {
        this.style.transform = 'translate(2px, 2px)';
        this.style.boxShadow = '3px 3px 0 var(--black)';
      });
      card.addEventListener('touchend', function() {
        this.style.transform = '';
        this.style.boxShadow = '';
      });
    });
  </script>
